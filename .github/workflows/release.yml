name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci
      - run: make lint
      - run: make test
      - run: make build

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Keyless sign release checksums
        run: |
          cosign sign-blob --yes \
            --output-signature dist/checksums.txt.sig \
            --output-certificate dist/checksums.txt.pem \
            dist/checksums.txt

      - name: Verify keyless signature in CI
        run: |
          cosign verify-blob \
            --certificate dist/checksums.txt.pem \
            --signature dist/checksums.txt.sig \
            --certificate-identity-regexp "^https://github.com/morliont/actual-budget-cli/.github/workflows/release.yml@refs/tags/v.*$" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            dist/checksums.txt

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/checksums.txt

      - name: Upload checksum signature assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            dist/checksums.txt.sig \
            dist/checksums.txt.pem \
            --clobber
